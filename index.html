<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHADOWMARK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="scanlines"></div>

    <div id="appRoot">
        <!-- Rendered by JS -->
    </div>

    <div id="toastContainer"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth, signInAnonymously, onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, getDoc, updateDoc,
            onSnapshot, collection, runTransaction, query,
            where, getDocs, writeBatch, serverTimestamp, Timestamp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window._firebase = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, doc, setDoc, getDoc, updateDoc,
            onSnapshot, collection, runTransaction, query,
            where, getDocs, writeBatch, serverTimestamp, Timestamp
        };

        // Signal that Firebase is ready
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script src="app.js"></script>
</body>
</html>
